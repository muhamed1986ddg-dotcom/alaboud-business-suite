name: Dependency Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.project }} --ignore-scripts --no-audit --no-fund

      - name: Audit high and critical vulnerabilities
        run: npm audit --prefix ${{ matrix.project }} --audit-level=high
