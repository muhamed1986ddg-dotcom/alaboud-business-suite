name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend --ignore-scripts --no-audit --no-fund

      - name: Check backend JavaScript syntax
        run: |
          find backend/src backend/tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run Jest tests with coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-only-secret-not-for-production
        run: npm run test:coverage --prefix backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: warn
          retention-days: 14
