name: Render Deploy

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Skip when deploy hook is not configured
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured; CI passed but deployment was skipped."

      - name: Trigger Render deployment
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --show-error --silent --retry 3 --request POST "$RENDER_DEPLOY_HOOK_URL"
