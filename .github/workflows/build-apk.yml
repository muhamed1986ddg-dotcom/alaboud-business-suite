name: Build Android v14.0 Enterprise Final APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify Android project
        run: |
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/alaboud/businesssuite/MainActivity.kt
          test -f app/src/main/res/drawable/ic_notification.xml

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlAboud-Mobile-v14.0-Enterprise-Final-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
