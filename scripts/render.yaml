services:
  - type: web
    name: alaboud-business-suite
    runtime: node
    region: virginia
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JAD_CONNECTOR_MODE
        value: browser
      - key: JAD_HTTP_FALLBACK
        value: "false"
